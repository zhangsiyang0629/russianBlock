<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Sketchbook Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
          darkMode: "class",

            extend: {
              "colors": {
                      "outline": "#7b7767",
                      "on-tertiary-fixed": "#4f341f",

                      "surface-variant": "#e4ddc5",
                      "surface-container-highest": "#e4ddc5",
                      "outline-variant": "#b2ad9c",
                      "surface-bright": "#fdf6e3",
                      "on-tertiary": "#fff0e8",
                      "on-secondary-fixed": "#004938",
                      "surface-tint": "#993d46",
                      "primary": "#993d46",
                      "surface-container": "#efe8d2",
                      "tertiary-fixed": "#fdd1b4",
                      "inverse-on-surface": "#a29d8c",
                      "primary-container": "#ff8c94",
                      "secondary-container": "#b1efd8",
                      "on-surface": "#322f22",
                      "tertiary-dim": "#684933",
                      "secondary-fixed-dim": "#a3e1ca",
                      "on-primary-fixed": "#330008",
                      "surface-container-high": "#eae2cb",
                      "on-error-container": "#520c00",
                      "tertiary-container": "#fdd1b4",
                      "tertiary": "#75553e",
                      "surface-container-low": "#f8f0dc",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#1d5c4a",
                      "on-secondary-fixed-variant": "#296654",
                      "secondary": "#296654",
                      "primary-fixed": "#ff8c94",
                      "primary-fixed-dim": "#ef7f87",
                      "error-container": "#f95630",
                      "background": "#fdf6e3",
                      "surface-dim": "#dcd4bb",
                      "on-background": "#322f22",
                      "on-surface-variant": "#5f5b4d",
                      "primary-dim": "#8a313b",
                      "tertiary-fixed-dim": "#eec4a7",
                      "error-dim": "#b92902",
                      "on-primary-container": "#5e0f1c",
                      "secondary-fixed": "#b1efd8",
                      "surface": "#fdf6e3",
                      "on-primary": "#ffefef",
                      "on-error": "#ffefec",
                      "inverse-primary": "#ff8c94",
                      "on-primary-fixed-variant": "#6a1824",
                      "error": "#b02500",
                      "on-secondary": "#c5ffe9",
                      "secondary-dim": "#1b5948",
                      "inverse-surface": "#100e05",
                      "on-tertiary-container": "#644630"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "display": ["Plus Jakarta Sans"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Plus Jakarta Sans"]
              }
            }
          }
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .crayon-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3Y%3Cfilter id='noiseFilter'%3Y%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
        .hand-drawn-border {
            border-style: solid;
            border-width: 4px;
            border-color: #322f22;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }
        .hand-drawn-path {
            clip-path: polygon(2% 2%, 98% 4%, 96% 96%, 4% 98%);
        }
        .tape-orange {
            background-color: #ff8c94;
            opacity: 0.8;
            transform: rotate(-15deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body crayon-texture min-h-screen flex flex-col overflow-hidden">
<!-- Main Menu Background (Dimmed) -->
<div class="fixed inset-0 z-0 flex flex-col items-center justify-center pointer-events-none opacity-30 select-none">
<h1 class="font-display font-black text-9xl tracking-tighter text-on-surface mb-8 -rotate-3">BLOCKS</h1>
<div class="grid grid-cols-4 gap-4 p-8 border-4 border-on-background rounded-xl rotate-1">
<div class="w-16 h-16 bg-primary-container border-4 border-on-background hand-drawn-path"></div>
<div class="w-16 h-16 bg-secondary-container border-4 border-on-background hand-drawn-path"></div>
<div class="w-16 h-16 bg-tertiary-container border-4 border-on-background hand-drawn-path"></div>
<div class="w-16 h-16 bg-primary border-4 border-on-background hand-drawn-path"></div>
</div>
</div>
<!-- Top AppBar (from JSON) -->
<header class="bg-orange-50 dark:bg-stone-900 w-full top-0 px-4 py-2 z-10">
<div class="flex items-center justify-between w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-orange-600 dark:text-orange-400 hover:rotate-1 hover:scale-105 transition-transform active:-rotate-2 active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h2 class="SETTINGS font-plus-jakarta-sans tracking-widest uppercase font-bold text-lg text-orange-600 dark:text-orange-400">SETTINGS</h2>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="bg-stone-200 dark:bg-stone-800 h-[4pt] w-full block"></div>
</header>
<!-- Overlay / Dialog Container -->
<main class="flex-grow flex items-center justify-center p-6 relative z-20">
<div class="absolute inset-0 bg-surface-dim opacity-40"></div>
<!-- The Settings Dialog -->
<div class="relative w-full max-w-lg bg-surface-container-lowest hand-drawn-border p-8 md:p-12 rotate-1 shadow-2xl">
<!-- Corner Tapes -->
<div class="absolute -top-4 -left-4 w-20 h-8 tape-orange rotate-[-45deg]"></div>
<div class="absolute -bottom-4 -right-4 w-20 h-8 tape-orange rotate-[-30deg]"></div>
<!-- Close Button (X) -->
<button class="absolute -top-6 -right-6 w-14 h-14 bg-error-container border-4 border-on-background rounded-full flex items-center justify-center hover:scale-110 active:scale-90 transition-all -rotate-3 shadow-lg">
<span class="material-symbols-outlined text-on-error-container font-bold" data-icon="close">close</span>
</button>
<!-- Headline -->
<div class="mb-12 text-center">
<h3 class="font-display font-extrabold text-5xl text-on-surface tracking-tight -rotate-1">SETTINGS</h3>
<div class="h-1.5 w-32 bg-primary mx-auto mt-2 rounded-full opacity-30"></div>
</div>
<!-- Music Section -->
<section class="mb-10">
<div class="flex justify-between items-end mb-4">
<label class="font-display font-bold text-2xl text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="music_note">music_note</span>
                        MUSIC
                    </label>
<button class="w-16 h-8 bg-surface-container-high border-[3pt] border-on-background rounded-full p-1 relative flex items-center group transition-all">
<div class="w-6 h-6 bg-primary-container border-[2pt] border-on-background rounded-full group-hover:translate-x-1 transition-transform shadow-sm"></div>
</button>
</div>
<!-- Custom Slider -->
<div class="relative h-10 flex items-center">
<div class="absolute w-full h-3 bg-surface-container-high border-[3pt] border-on-background rounded-full"></div>
<div class="absolute w-3/4 h-3 bg-primary-container border-[3pt] border-on-background rounded-l-full"></div>
<!-- Crayon-textured thumb -->
<div class="absolute left-3/4 -translate-x-1/2 w-8 h-8 bg-primary border-[3pt] border-on-background rounded-full rotate-6 shadow-md cursor-pointer hover:scale-110 active:scale-95 transition-all">
<div class="crayon-texture w-full h-full rounded-full opacity-40"></div>
</div>
</div>
</section>
<!-- Sound FX Section -->
<section class="mb-12">
<div class="flex justify-between items-end mb-4">
<label class="font-display font-bold text-2xl text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="volume_up">volume_up</span>
                        SOUND FX
                    </label>
<button class="w-16 h-8 bg-secondary-container border-[3pt] border-on-background rounded-full p-1 relative flex items-center justify-end group transition-all">
<div class="w-6 h-6 bg-secondary border-[2pt] border-on-background rounded-full transition-transform shadow-sm"></div>
</button>
</div>
<!-- Custom Slider -->
<div class="relative h-10 flex items-center">
<div class="absolute w-full h-3 bg-surface-container-high border-[3pt] border-on-background rounded-full"></div>
<div class="absolute w-1/2 h-3 bg-secondary-container border-[3pt] border-on-background rounded-l-full"></div>
<!-- Crayon-textured thumb -->
<div class="absolute left-1/2 -translate-x-1/2 w-8 h-8 bg-secondary border-[3pt] border-on-background rounded-full -rotate-6 shadow-md cursor-pointer hover:scale-110 active:scale-95 transition-all">
<div class="crayon-texture w-full h-full rounded-full opacity-40"></div>
</div>
</div>
</section>
<!-- Back Button -->
<div class="flex justify-center">
<button class="px-10 py-4 bg-tertiary-container border-4 border-on-background font-display font-black text-xl text-on-tertiary-container rotate-[-1deg] hover:rotate-1 hover:scale-105 active:scale-95 transition-all shadow-[6px_6px_0px_0px_rgba(50,47,34,1)]">
                    BACK TO MENU
                </button>
</div>
</div>
</main>
<!-- Bottom NavBar (from JSON) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-8">
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full border-[3pt] border-stone-800 dark:border-stone-100 bg-transparent shadow-[6px_6px_0px_0px_rgba(50,47,34,0.1)] flex justify-around items-center bg-stone-100 dark:bg-stone-800 overflow-hidden">
<a class="flex flex-col items-center justify-center text-stone-800 dark:text-stone-200 p-4 hover:-rotate-2 transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="home">home</span>
<span class="font-plus-jakarta-sans text-xs font-bold uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-orange-400 dark:bg-orange-600 text-white rounded-full p-4 rotate-2 hover:-rotate-2 transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="settings">settings</span>
<span class="font-plus-jakarta-sans text-xs font-bold uppercase">Settings</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-800 dark:text-stone-200 p-4 hover:-rotate-2 transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="leaderboard">leaderboard</span>
<span class="font-plus-jakarta-sans text-xs font-bold uppercase">Stats</span>
</a>
</div>
</nav>
<!-- Decorative Corner Doodle -->
<div class="fixed bottom-24 right-8 w-32 h-32 opacity-20 pointer-events-none -rotate-12">
<img class="w-full h-full object-contain" data-alt="a hand-drawn sketchy doodle of a tetris block made with charcoal pencil on textured paper" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIP5C2RVaFS5zLtfg6iKrtNE4eI1Lkyn2KHu10vactye5qfw0Krwzd_HEzB0aJre6sHuVS7bruG0rRg1qNQqZZI2F5Ixn4MwupW7o3KvxCyhYZxFqPHZ497X0RWC9b9IK4Gx0Tj2CEzJm92yt8pChO7DNBYERrgO4I7EClgn0KfcJlL_jpDCdKKOHgu3fQqjo2rbyInKBvNV5AIw6MD8N5mGjoATgqnDyINotX5OrawF9xd8R3KsufacBL8dOk5VspcP4DwLWzvkh0"/>
</div>
</body></html>
