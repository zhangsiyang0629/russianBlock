<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sketchy Tetris - The Living Sketchbook</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 48
        }
        .paper-texture {
            background-color: #fffcf5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
        .sketchy-border {
            border-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 5C15 4 85 6 95 5C96 15 94 85 95 95C85 96 15 94 5 95C4 85 6 15 5 5Z' stroke='%23322f22' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") 20 / 16px stretch;
        }
        .crayon-texture {
            background-image: linear-gradient(135deg, rgba(255,255,255,0.2) 25%, transparent 25%), linear-gradient(225deg, rgba(255,255,255,0.2) 25%, transparent 25%), linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%), linear-gradient(315deg, rgba(255,255,255,0.2) 25%, transparent 25%);
            background-position: 4px 0, 4px 0, 0 0, 0 0;
            background-size: 8px 8px;
            background-repeat: repeat;
        }
        .sketch-title {
            -webkit-text-stroke: 2px #322f22;
            paint-order: stroke fill;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FFB347",
                        "on-background": "#322f22",
                        "surface": "#fffcf5",
                        "on-surface": "#322f22",
                        "surface-container-highest": "#e4ddc5"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
</head>
<body class="paper-texture font-body text-on-background min-h-screen overflow-x-hidden flex flex-col">
<!-- Top AppBar -->
<header class="w-full px-6 py-4 flex justify-between items-center z-40">
<span class="material-symbols-outlined text-3xl cursor-pointer">menu</span>
<h1 class="text-xl font-black text-on-background font-headline tracking-tighter uppercase">
            SKETCHY TETRIS
        </h1>
<span class="material-symbols-outlined text-3xl cursor-pointer">settings</span>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative px-6 pb-24">
<!-- Decorative Crayon Blocks -->
<div class="absolute top-10 left-[10%] w-16 h-16 bg-[#ef7f87] border-4 border-on-background rotate-[-12deg] opacity-80 crayon-texture" style="clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 50%, 50% 100%, 0% 100%);"></div>
<div class="absolute top-20 right-[15%] w-12 h-20 bg-[#a3e1ca] border-4 border-on-background rotate-[15deg] opacity-70 crayon-texture" style="clip-path: polygon(0% 0%, 50% 0%, 50% 100%, 0% 100%);"></div>
<div class="absolute bottom-40 left-[5%] w-20 h-14 bg-[#fdd1b4] border-4 border-on-background rotate-[-8deg] opacity-60 crayon-texture" style="clip-path: polygon(0% 50%, 100% 50%, 100% 100%, 0% 100%);"></div>
<div class="absolute middle-right right-[8%] bottom-[30%] w-16 h-16 bg-[#ef7f87] border-4 border-on-background rotate-[25deg] opacity-50 crayon-texture" style="clip-path: polygon(25% 0%, 75% 0%, 75% 100%, 25% 100%);"></div>
<!-- Central Character Section -->
<div class="relative z-10 flex flex-col items-center">
<!-- Character with Irregular Frame -->
<div class="relative mb-6">
<div class="p-3 bg-white sketchy-border rotate-[-1deg] shadow-xl">
<img alt="Sketchy Russian Man" class="w-64 h-64 md:w-80 md:h-80 object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uj2vO87TrQbqX4b_JZ-L0x4hnMhLBnvrmTUfI7SFlXsJ8EsnKlisTC2vJ9O1X6dSoiWGn5c18v2z0u1X7Qra-X8BvPROLGm4cpS0peHI8MVSO3ZoOgEdoD31k6gYb2B88_gPfMoIjV6eTey6hdcZcN3SB9f5ZlGAEEjEyfPsi8avbFSUa5-X-fuv0ydyU0-HAKmIbmtvpz8uj5yAtek4zBGcfAgMb905agRt-wo5hdtGp7LL0w75I07K30"/>
</div>
<!-- Speech Bubble -->
<div class="absolute -top-6 -right-10 bg-white p-3 rounded-2xl border-4 border-on-background rotate-12 shadow-md">
<p class="font-headline font-black text-sm tracking-tighter uppercase italic">"CYKA BLOCKS!"</p>
</div>
</div>
<!-- Game Title Card -->
<div class="mb-10 text-center">
<h2 class="text-6xl md:text-8xl font-black text-primary sketch-title rotate-[-2deg] drop-shadow-[4px_4px_0px_#322f22] font-headline tracking-tighter leading-none">
                    SKETCHY<br/>TETRIS
                </h2>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-6 items-center w-full max-w-xs">
<!-- Play Button -->
<button class="w-full py-5 bg-primary text-white font-headline text-4xl font-black rounded-full border-4 border-on-background shadow-[6px_6px_0px_0px_#322f22] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all">
                    PLAY
                </button>
<!-- Secondary Actions -->
<div class="flex gap-4 w-full">
<button class="flex-1 py-3 bg-surface-container-highest border-4 border-on-background rounded-full font-headline font-bold text-on-surface shadow-[4px_4px_0px_0px_#322f22] rotate-1 active:shadow-none active:translate-x-1 active:translate-y-1 transition-all">
                        SCORES
                    </button>
<button class="flex-1 py-3 bg-white border-4 border-on-background rounded-full font-headline font-bold text-on-surface shadow-[4px_4px_0px_0px_#322f22] -rotate-1 active:shadow-none active:translate-x-1 active:translate-y-1 transition-all">
                        SHOP
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-surface border-t-4 border-on-background">
<!-- Play Tab (Active) -->
<div class="flex flex-col items-center justify-center bg-primary text-white rounded-full p-3 shadow-[4px_4px_0px_0px_#322f22] -rotate-2 cursor-pointer">
<span class="material-symbols-outlined">play_circle</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Play</span>
</div>
<!-- Scores Tab -->
<div class="flex flex-col items-center justify-center text-on-background p-2 cursor-pointer opacity-60 hover:opacity-100">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Scores</span>
</div>
<!-- Settings Tab -->
<div class="flex flex-col items-center justify-center text-on-background p-2 cursor-pointer opacity-60 hover:opacity-100">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Settings</span>
</div>
</nav>
</body></html>
